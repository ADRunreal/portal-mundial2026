<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Mundial 2026 | Resultados en Vivo y Estadísticas</title>
    <!-- Tailwind CSS para diseño espectacular estilo Sofascore -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fifaNavy: '#0b132b',
                        fifaGold: '#d4af37',
                        fifaGreen: '#10b981'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <!-- Navbar -->
    <nav class="bg-fifaNavy border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-between items-center">
            <h1 class="text-xl font-black tracking-wider text-fifaGold">COPA 2026 <span class="text-xs text-white bg-red-600 px-1.5 py-0.5 rounded ml-1 animate-pulse">EN VIVO</span></h1>
            <div class="space-x-4 text-sm font-semibold">
                <a href="#partidos" class="hover:text-fifaGold transition">Partidos</a>
                <a href="#grupos" class="hover:text-fifaGold transition">Grupos</a>
                <a href="#goleadores" class="hover:text-fifaGold transition">Goleadores</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="bg-gradient-to-r from-purple-900 to-fifaNavy py-12 px-4 text-center border-b border-slate-800">
        <h2 class="text-4xl md:text-5xl font-extrabold mb-4">El Portal Mundialista Definitivo</h2>
        <p class="text-slate-400 max-w-xl mx-auto text-sm md:text-base">Sigue todos los partidos, estadísticas y resultados del torneo más grande de la historia en tiempo real.</p>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 my-6">
        
        <!-- Centro de Partidos (Sofascore Style) -->
        <section class="lg:col-span-2 space-y-4">
            <h3 class="text-lg font-bold border-l-4 border-fifaGold pl-2">Partidos Destacados</h3>
            <div id="contenedor-partidos" class="space-y-3">
                <!-- Los partidos se cargarán automáticamente aquí con JavaScript -->
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center animate-pulse">
                    <div class="h-4 bg-slate-700 w-1/3 rounded"></div>
                    <div class="h-4 bg-slate-700 w-14 rounded"></div>
                    <div class="h-4 bg-slate-700 w-1/3 rounded"></div>
                </div>
            </div>
        </section>

        <!-- Sidebar: Tablas y Goleadores -->
        <aside class="space-y-6">
            <div>
                <h3 class="text-lg font-bold border-l-4 border-fifaGreen pl-2 mb-3">Grupo A</h3>
                <div class="bg-slate-800 rounded-xl p-4 border border-slate-700 overflow-hidden">
                    <table class="w-full text-sm text-left">
                        <thead>
                            <tr class="text-slate-400 border-b border-slate-700">
                                <th class="pb-2">Pos</th>
                                <th class="pb-2">Equipo</th>
                                <th class="pb-2 text-center">PTS</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-grupo">
                            <!-- Datos dinámicos -->
                        </tbody>
                    </table>
                </div>
            </div>
        </aside>
    </main>

    <!-- Script para conectar con tus datos gratuitos -->
    <script>
        // Simularemos los datos que se actualizarán solos en tu GitHub
        const datosMundial = {
            partidos: [
                { local: "Uruguay", visitante: "Corea del Sur", golesL: 2, golesV: 1, estado: "Finalizado", minuto: "" },
                { local: "Estados Unidos", visitante: "México", golesL: 0, golesV: 0, estado: "En Vivo", minuto: "42'" }
            ],
            grupoA: [
                { pos: 1, equipo: "Uruguay", pts: 3 },
                { pos: 2, equipo: "Estados Unidos", pts: 1 },
                { pos: 3, equipo: "México", pts: 1 },
                { pos: 4, equipo: "Corea del Sur", pts: 0 }
            ]
        };

        // Renderizar partidos
        const container = document.getElementById('contenedor-partidos');
        container.innerHTML = datosMundial.partidos.map(p => `
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center hover:border-slate-600 transition">
                <div class="w-2/5 font-semibold text-right">${p.local}</div>
                <div class="w-1/5 text-center bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-700">
                    <span class="text-fifaGold font-mono font-bold">${p.golesL} - ${p.golesV}</span>
                    <div class="text-[10px] text-slate-400 uppercase mt-0.5">${p.estado} ${p.minuto}</div>
                </div>
                <div class="w-2/5 font-semibold text-left">${p.visitante}</div>
            </div>
        `).join('');

        // Renderizar tabla
        const tabla = document.getElementById('tabla-grupo');
        tabla.innerHTML = datosMundial.grupoA.map(e => `
            <tr class="border-b border-slate-700/50 last:border-0">
                <td class="py-2.5 font-bold text-slate-400">${e.pos}</td>
                <td class="py-2.5 font-semibold">${e.equipo}</td>
                <td class="py-2.5 text-center font-bold text-fifaGreen">${e.pts}</td>
            </tr>
        `).join('');
    </script>
</body>
</html>
